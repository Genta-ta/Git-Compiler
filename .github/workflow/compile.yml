name: Kernel Builder

on:
  workflow_dispatch:
    inputs:
      KERNEL_URL:
        description: 'Kernel Source URL'
        required: true
        default: 'https://github.com/Genta-ta/DK-kernel'
      KERNEL_BRANCH:
        description: 'Kernel Branch'
        required: true
        default: 'main'
      KERNEL_DEFCONFIG:
        description: 'Defconfig'
        required: true
        default: 'vendor/munch_defconfig'
      KERNEL_NAME:
        description: 'Kernel Name (CONFIG_LOCALVERSION)'
        required: false
        default: '-DK-kernel'
      KSU_VARIANT:
        description: 'KernelSU Variant'
        required: true
        type: choice
        options:
          - NoKSU
          - RKSU
          - SukiSU
          - KSU-Next
          - KSU-Official
        default: 'NoKSU'
      ANYKERNEL_URL:
        description: 'AnyKernel3 URL'
        required: true
        default: 'https://github.com/Genta-ta/AnyKernel3'
      ANYKERNEL_BRANCH:
        description: 'AnyKernel3 Branch'
        required: true
        default: 'main'
      CLANG_TOOLCHAIN:
        description: 'Clang Toolchain'
        required: true
        type: choice
        options:
          - aosp-clang
          - neutron-clang
          - system-clang
        default: 'system-clang'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu clang lld llvm flex bison \
            libssl-dev bc python3 binutils-aarch64-linux-gnu lz4 zip

      - name: Download Clang Toolchain
        run: |
          if [[ "${{ github.event.inputs.CLANG_TOOLCHAIN }}" == "neutron-clang" ]]; then
            mkdir -p clang
            wget -q https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/10032024/neutron-clang-10032024.tar.zst -O clang.tar.zst
            unzstd -d clang.tar.zst
            tar -xf clang.tar -C clang
            echo "CLANG_PATH=$(pwd)/clang/bin" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.CLANG_TOOLCHAIN }}" == "aosp-clang" ]]; then
            mkdir -p clang
            wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz -O clang.tar.gz
            tar -xf clang.tar.gz -C clang
            echo "CLANG_PATH=$(pwd)/clang/bin" >> $GITHUB_ENV
          else
            echo "CLANG_PATH=/usr/bin" >> $GITHUB_ENV
          fi

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.KERNEL_BRANCH }} \
            ${{ github.event.inputs.KERNEL_URL }} kernel
          echo "[+] Kernel cloned"

      - name: Setup KSU Variant
        working-directory: kernel
        run: |
          KSU_VARIANT="${{ github.event.inputs.KSU_VARIANT }}"
          echo "[+] Setting up: $KSU_VARIANT"

          case "$KSU_VARIANT" in
            RKSU)
              git clone --depth=1 https://github.com/rsuntk/KernelSU -b main KernelSU
              ln -sf $(pwd)/KernelSU/kernel drivers/kernelsu
              ;;
            SukiSU)
              git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra -b main KernelSU
              ln -sf $(pwd)/KernelSU/kernel drivers/kernelsu
              ;;
            KSU-Next)
              git clone --depth=1 https://github.com/tiann/KernelSU -b next KernelSU
              ln -sf $(pwd)/KernelSU/kernel drivers/kernelsu
              ;;
            KSU-Official)
              git clone --depth=1 https://github.com/tiann/KernelSU -b main KernelSU
              ln -sf $(pwd)/KernelSU/kernel drivers/kernelsu
              ;;
            NoKSU)
              echo "[+] NoKSU selected, skipping"
              ;;
          esac

          if [ "$KSU_VARIANT" != "NoKSU" ]; then
            ls drivers/kernelsu/
          fi

      - name: Set Kernel Name
        working-directory: kernel
        run: |
          KERNEL_NAME="${{ github.event.inputs.KERNEL_NAME }}"
          if [ -n "$KERNEL_NAME" ]; then
            sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"${KERNEL_NAME}\"/" \
              arch/arm64/configs/${{ github.event.inputs.KERNEL_DEFCONFIG }}
            echo "[+] Kernel name set to: $KERNEL_NAME"
          fi

      - name: Build Kernel
        working-directory: kernel
        run: |
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          export ARCH=arm64
          export KBUILD_BUILD_USER="git-compiler"
          export KBUILD_BUILD_HOST="Github"
          make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump STRIP=llvm-strip \
            ${{ github.event.inputs.KERNEL_DEFCONFIG }}
          make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump STRIP=llvm-strip -j$(nproc)

      - name: Generate DTBO
        working-directory: kernel
        run: |
          if [ -f scripts/dtc/mkdtboimg.py ]; then
            DTBO_FILES=$(find out/arch/arm64/boot/dts/vendor -name "*.dtbo" | sort)
            if [ -n "$DTBO_FILES" ]; then
              python3 scripts/dtc/mkdtboimg.py create out/arch/arm64/boot/dtbo.img $DTBO_FILES
              echo "[+] DTBO generated"
            else
              echo "[-] No DTBO files found"
            fi
          fi

      - name: Generate Image.lz4-dtb
        working-directory: kernel
        run: |
          if [ -f out/arch/arm64/boot/Image ]; then
            lz4 -f out/arch/arm64/boot/Image out/arch/arm64/boot/Image.lz4
            # Try overlay dtbo first, fallback to dtbo.img
            DTBO=$(find out/arch/arm64/boot/dts/vendor -name "*overlay*.dtbo" | head -1)
            if [ -n "$DTBO" ]; then
              cat out/arch/arm64/boot/Image.lz4 "$DTBO" > out/arch/arm64/boot/Image.lz4-dtb
            else
              cat out/arch/arm64/boot/Image.lz4 > out/arch/arm64/boot/Image.lz4-dtb
            fi
            echo "[+] Image.lz4-dtb generated"
          fi

      - name: Package AnyKernel3
        working-directory: kernel
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.ANYKERNEL_BRANCH }} \
            ${{ github.event.inputs.ANYKERNEL_URL }} AnyKernel3

          cp out/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true
          cp out/arch/arm64/boot/Image.lz4-dtb AnyKernel3/ 2>/dev/null || true

          if [ -f out/arch/arm64/boot/dtbo.img ]; then
            cp out/arch/arm64/boot/dtbo.img AnyKernel3/munch-aosp-dtbo.img
            cp out/arch/arm64/boot/dtbo.img AnyKernel3/munch-miui-dtbo.img
          fi

          DATE=$(date +%Y%m%d-%H%M)
          KSU="${{ github.event.inputs.KSU_VARIANT }}"
          ZIP_NAME="DK-kernel-${KSU}-${DATE}"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

          cd AnyKernel3
          zip -r9 "../../${ZIP_NAME}.zip" * -x .git README.md
          echo "[+] ZIP created: ${ZIP_NAME}.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: |
            ${{ env.ZIP_NAME }}.zip
            kernel/out/arch/arm64/boot/Image
            kernel/out/arch/arm64/boot/Image.lz4-dtb 
